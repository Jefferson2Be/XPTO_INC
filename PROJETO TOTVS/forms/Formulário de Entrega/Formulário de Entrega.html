<html>

<head>
	<link type="text/css" rel="stylesheet" href="/style-guide/css/fluig-style-guide-flat.min.css" />
	<link type="text/css" rel="stylesheet" href="style.css" />
	<script type="text/javascript" src="/portal/resources/js/jquery/jquery.js"></script>
	<script type="text/javascript" src="/portal/resources/js/jquery/jquery-ui.min.js"></script>
	<script type="text/javascript" src="/portal/resources/js/mustache/mustache-min.js"></script>
	<script type="text/javascript" src="/style-guide/js/fluig-style-guide.min.js" charset="utf-8"></script>
	<script type="text/javascript" src="/webdesk/vcXMLRPC.js"></script>

</head>

<body>
	<div class="fluig-style-guide">
		<form name="form" role="form">

				<!-- Campos de controle-->
				<input type="hidden" name="matriculaResponsavel" id="matriculaResponsavel">
				<!--Fim Campos de controle-->

			<section id="painelDados">
				<div class="panel panel-primary">
					<div class="panel-heading">
						<h3 class="panel-title">Dados de Entrega</h3>
					</div>
					<div class="panel-body">
						<div class="row">
							<div class="col-md-3 form-group">
								<label for="cepOrigem" class="required">CEP Origem</label>
								<input type="text" class="form-control" name="cepOrigem" id="cepOrigem"
									mask="00000-000" onblur="rules.buscaCep()">
							</div>

							<div class="col-md-3 form-group">
								<label for="cidadeOrigem" class="required">Cidade</label>
								<input type="text" class="form-control" name="cidadeOrigem" id="cidadeOrigem" readonly>
							</div>

							<div class="col-md-3 form-group">
								<label for="bairroOrigem" class="required">Bairro</label>
								<input type="text" class="form-control" name="bairroOrigem" id="bairroOrigem" readonly>
							</div>

							<div class="col-md-3 form-group">
								<label for="endOrigem" class="required">Endereço</label>
								<input type="text" class="form-control" name="endOrigem" id="endOrigem" readonly>
							</div>
						</div>
						<div class="row">
							<div class="col-md-3 form-group">
								<label for="filialEntrega" class="required">Filial de Entrega</label>
								<input type="zoom" id="filialEntrega" name="filialEntrega" data-zoom="{		
										'displayKey':'codFilial',
										'datasetId':'DS_PRE_CADASTRO_FILIAL',
										'maximumSelectionLength':'1',
										'placeholder':'',
										'fields':[
													{
													'field':'codFilial',
													'label':'Codigo'
													},
													{
													'field':'descFilial',
													'label':'Descrição'
													},
													{
													'field':'matriculaResponsavel',
													'visible':'false'
													}
												]
										}" />
							</div>

							<div class="col-md-3">
								<label for="prazoEntrega" class="required">Prazo de Entrega</label>
								<div class="input-group date">
									<input type="text" name="prazoEntrega" id="prazoEntrega" class="form-control" mask="00/00/0000" />
									<span class="input-group-addon">
										<span class="fluigicon fluigicon-calendar"></span>
									</span>
								</div>
							</div>
						</div>

						<div class="row">
							<div class="col-md-12 form-group">
								<label for="descMercadoria" class="required">Descrição da mercadoria</label>
								<textarea name="descMercadoria" id="descMercadoria" rows="3"
									class="form-control"></textarea>
							</div>
						</div>
					</div>
				</div>
			</section>

			<section id="painelAlmoxarife" hidden>
				<div class="panel panel-primary">
					<div class="panel-heading">
						<h3 class="panel-title">Confirmação da Entrega</h3>
					</div>
					<div class="panel-body">
						<div class="row">
							<div class="col-md-3 form-group">
								<label for="responsavelAlmoxarife">Responsável</label>
								<input type="text" class="form-control" name="responsavelAlmoxarife" id="responsavelAlmoxarife" readonly>
							</div>
			
							<div class="col-md-3 form-group">
								<label for="dtAlmoxarife">Data de confirmação</label>
								<input type="text" class="form-control" name="dtAlmoxarife" id="dtAlmoxarife" readonly>
							</div>
			
							<div class="col-md-3 form-group">
								<label for="mecRecebida" class="required">Mercadoria Recebida ?</label>
								<select name="mecRecebida" id="mecRecebida" class="form-control">
									<option selected hidden value="">Selecione uma Opção</option>
									<option value="Sim">Sim</option>
									<option value="Nao">Não</option>
								</select>
							</div>
			
						</div>
					</div>
				</div>
			</section>
		</form>
	</div>

	<script src="atividades.js"></script>
	<script src="validateFields.js"></script>
	<script src="beforeSendValidate.js"></script>
	<script src="zoom.js"></script>
	<script src="utils.js"></script>
	<script src="rules.js"></script>
	<script src="consultaDS.js"></script>
	<script src="main.js"></script>
</body>

</html>
